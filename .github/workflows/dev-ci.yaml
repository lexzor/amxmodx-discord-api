name: Dev CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - dev


jobs:

  # ---------------------------------------------------
  # 1. DOCKER + LIBS BUILD
  # ---------------------------------------------------
  build-dev:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - name: debian12-i386
            context: ./docker-images/debian12-i386
            dockerfile: ./docker-images/debian12-i386/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: amxmodx-discord-api/${{ matrix.image.name }}:dev
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute libs hash
        id: libs_hash
        run: |
          HASH=$(find libs_builder.sh docker-images -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Restore libs cache
        id: libs_cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/
          key: libs-${{ matrix.image.name }}-${{ steps.libs_hash.outputs.hash }}

      - name: Run libs builder
        if: steps.libs_cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxmodx-discord-api/${{ matrix.image.name }}:dev \
            bash ./libs_builder.sh

      - name: Save libs cache
        if: steps.libs_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/
          key: libs-${{ matrix.image.name }}-${{ steps.libs_hash.outputs.hash }}

      # Upload vendor for next job
      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendor-${{ matrix.image.name }}
          path: vendor/


  # ---------------------------------------------------
  # 2. BUILD PROJECT + PACKAGE
  # ---------------------------------------------------
  build-project:
    runs-on: ubuntu-latest
    needs: build-dev

    strategy:
      matrix:
        config:
          - name: release
            build_type: Release
          - name: debug
            build_type: Debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor-debian12-i386
          path: vendor/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build project (CMake)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxmodx-discord-api/debian12-i386:dev \
            bash -c "
              rm -rf build &&
              mkdir build &&
              cd build &&
              cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} &&
              make -j$(nproc || echo 2)
            "

      - name: Prepare package structure
        run: |
          mkdir -p package

          mkdir -p package/bin/linux
          cp -r build/*.so package/bin/linux/ || true

          mkdir -p package/addons/amxmodx/plugins
          cp -r addons/amxmodx/plugins/*.amxx package/addons/amxmodx/plugins/ || true

          mkdir -p package/addons/amxmodx/scripting
          cp -r addons/amxmodx/scripting/* package/addons/amxmodx/scripting/ || true

          mkdir -p package/addons/amxmodx/configs
          cp -r addons/amxmodx/configs/* package/addons/amxmodx/configs/ || true

      - name: Create ZIP
        run: |
          VERSION="v0.0.0-${GITHUB_SHA::7}"
          ZIP_NAME="amxmodx-discord-api-${VERSION}-${{ matrix.config.name }}.zip"

          cd package
          zip -r ../$ZIP_NAME .

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}