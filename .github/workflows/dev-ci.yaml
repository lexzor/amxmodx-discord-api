name: Dev CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - dev


# ---------------------------------------------------
# 1. DOCKER IMAGE (cached in GHA)
# ---------------------------------------------------
jobs:
  docker-cache:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - name: debian12-i386
            context: ./docker-images/debian12-i386
            dockerfile: ./docker-images/debian12-i386/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: shared-builder

      - name: Build Docker image (cache only)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: amxmodx-discord-api/${{ matrix.image.name }}:dev
          push: false
          load: true
          cache-from: type=gha,scope=dev-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=dev-${{ matrix.image.name }}


# ---------------------------------------------------
# 2. LIBS BUILD (cached + artifact)
# ---------------------------------------------------
  libs-build:
    runs-on: ubuntu-latest
    needs: docker-cache

    strategy:
      matrix:
        image:
          - name: debian12-i386

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: shared-builder

      - name: Build Docker image (runtime)
        uses: docker/build-push-action@v6
        with:
          context: ./docker-images/${{ matrix.image.name }}
          file: ./docker-images/${{ matrix.image.name }}/Dockerfile
          tags: amxmodx-discord-api/${{ matrix.image.name }}:dev
          push: false
          load: true
          cache-from: type=gha,scope=dev-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=dev-${{ matrix.image.name }}

      - name: Compute libs hash
        id: hash
        run: |
          HASH=$(find libs_builder.sh docker-images -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Restore libs cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/bin
          key: libs-${{ matrix.image.name }}-${{ steps.hash.outputs.hash }}

      - name: Build libs (cache miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxmodx-discord-api/${{ matrix.image.name }}:dev \
            bash ./libs_builder.sh

      - name: Save libs cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/bin
          key: libs-${{ matrix.image.name }}-${{ steps.hash.outputs.hash }}

      - name: Upload libs artifact (MANDATORY fallback)
        uses: actions/upload-artifact@v4
        with:
          name: vendor-bin
          path: vendor/bin


# ---------------------------------------------------
# 3. BUILD PROJECT + PACKAGE
# ---------------------------------------------------
  build-project:
    runs-on: ubuntu-latest
    needs: libs-build

    strategy:
      matrix:
        config:
          - name: release
            build_type: Release
          - name: debug
            build_type: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Download libs
        uses: actions/download-artifact@v4
        with:
          name: vendor-bin
          path: vendor/bin

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: shared-builder

      - name: Build Docker image (runtime)
        uses: docker/build-push-action@v6
        with:
          context: ./docker-images/debian12-i386
          file: ./docker-images/debian12-i386/Dockerfile
          tags: amxmodx-discord-api/debian12-i386:dev
          push: false
          load: true
          cache-from: type=gha,scope=dev-debian12-i386
          cache-to: type=gha,mode=max,scope=dev-debian12-i386

      - name: Build project
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxmodx-discord-api/debian12-i386:dev \
            bash -c "
              rm -rf build &&
              mkdir build &&
              cd build &&
              cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
                -DLIB_DIR=/workspace/vendor/bin &&
              make -j$(nproc || echo 2)
            "

      - name: Package
        run: |
          mkdir -p package/bin/linux
          cp -r build/*.so package/bin/linux/ || true

          mkdir -p package/addons/amxmodx/scripting
          cp -r addons/amxmodx/scripting/* package/addons/amxmodx/scripting/ || true

          mkdir -p package/addons/amxmodx/configs
          cp -r addons/amxmodx/configs/* package/addons/amxmodx/configs/ || true

      - name: Create ZIP
        run: |
          VERSION="v0.0.0-${GITHUB_SHA::7}"
          ZIP="amxmodx-discord-api-${VERSION}-${{ matrix.config.name }}.zip"

          cd package
          zip -r ../$ZIP .

          echo "ZIP=$ZIP" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP }}
          path: ${{ env.ZIP }}