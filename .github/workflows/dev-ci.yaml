name: Dev CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
# ---------------------------------------------------
# 1. VERSIONING
# ---------------------------------------------------
  versioning:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          set -euo pipefail
          VERSION=$(tr -d '\n' < VERSION)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION must be semantic version format like 1.2.3"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

# ---------------------------------------------------
# 2. DOCKER IMAGE (GHA CACHE ONLY)
# ---------------------------------------------------
  docker-cache:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - name: debian12-i386
            context: ./docker-images/debian12-i386
            dockerfile: ./docker-images/debian12-i386/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: shared-builder

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: amxx-builder:${{ matrix.image.name }}
          load: true
          cache-from: type=gha,scope=docker-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.image.name }}
          provenance: false

# ---------------------------------------------------
# 3. LIBS BUILD (cached + artifact)
# ---------------------------------------------------
  libs-build:
    runs-on: ubuntu-latest
    needs: docker-cache

    strategy:
      matrix:
        image:
          - name: debian12-i386

    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
      libs-hash: ${{ steps.hash.outputs.hash }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute libs hash
        id: hash
        run: |
          set -euo pipefail
          HASH=$(find libs_builder.sh docker-images -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore libs cache
        id: cache
        uses: actions/cache@v4
        with:
          path: vendor/bin
          key: libs-${{ matrix.image.name }}-${{ steps.hash.outputs.hash }}

      - uses: docker/setup-buildx-action@v3
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          driver: docker-container
          name: shared-builder

      - name: Build Docker image (cache-miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./docker-images/${{ matrix.image.name }}
          file: ./docker-images/${{ matrix.image.name }}/Dockerfile
          tags: amxx-builder:${{ matrix.image.name }}
          load: true
          cache-from: type=gha,scope=docker-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.image.name }}
          provenance: false

      - name: Build libs (cache miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxx-builder:${{ matrix.image.name }} \
            bash ./libs_builder.sh

      - name: Upload libs artifact
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vendor-bin
          path: vendor/bin

# ---------------------------------------------------
# 4. COMPILE AMXX SCRIPTS
# ---------------------------------------------------
  compile-amxx:
    runs-on: ubuntu-latest
    needs: versioning
    env:
      VERSION: ${{ needs.versioning.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Patch versioned include for compiler
        run: |
          set -euo pipefail
          sed -i \
            "s/^#define DISCORDAPI_VERSION.*/#define DISCORDAPI_VERSION \"$VERSION\"/" \
            amxmodx/scripting/include/discordapiconsts.inc

      - name: Download & extract AMXX compiler
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y libc6:i386 libstdc++6:i386

          curl -L "https://github.com/alliedmodders/amxmodx/releases/download/1.9.0.5303/amxmodx-1.9.0-git5303-base-linux.tar.gz" \
            -o amxmodx-base.tar.gz
          tar -xzf amxmodx-base.tar.gz

          chmod +x addons/amxmodx/scripting/amxxpc

      - name: Prepare compiler workspace
        run: |
          set -euo pipefail
          COMPILER_DIR="addons/amxmodx/scripting"
          WORKSPACE_SMA="amxmodx/scripting"
          WORKSPACE_INC="amxmodx/scripting/include"

          rm -f "$COMPILER_DIR"/*.sma
          cp "$WORKSPACE_SMA"/*.sma "$COMPILER_DIR/"
          cp "$WORKSPACE_INC"/*.inc "$COMPILER_DIR/include/"

          mkdir -p compiled_plugins
          ls -la "$COMPILER_DIR"/*.sma

      - name: Compile plugins
        run: |
          set -euo pipefail
          COMPILER_DIR="${{ github.workspace }}/addons/amxmodx/scripting"
          FAILED=()

          for SMA in "$COMPILER_DIR"/*.sma; do
            NAME=$(basename "$SMA" .sma)
            echo "Compiling $NAME.sma..."

            (cd "$COMPILER_DIR" && ./amxxpc "$SMA" \
              -i"$COMPILER_DIR/include" \
              -o"${{ github.workspace }}/compiled_plugins/$NAME.amxx") || FAILED+=("$NAME.sma")
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::The following plugins failed to compile: ${FAILED[*]}"
            exit 1
          fi

      - name: Upload compiled plugins artifact
        uses: actions/upload-artifact@v4
        with:
          name: amxx-plugins
          path: compiled_plugins/

# ---------------------------------------------------
# 5. BUILD PROJECT + PACKAGE
# ---------------------------------------------------
  build-project:
    runs-on: ubuntu-latest
    needs: [libs-build, compile-amxx, versioning]
    env:
      VERSION: ${{ needs.versioning.outputs.version }}

    strategy:
      matrix:
        config:
          - name: release
            build_type: Release
          - name: debug
            build_type: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Patch versioned files for build
        run: |
          set -euo pipefail
          sed -i \
            "s/#define MODULE_VERSION.*/#define MODULE_VERSION \"$VERSION\"/" \
            vendor/include/amxmodx/sdk/moduleconfig.h

          sed -i \
            "s/^#define DISCORDAPI_VERSION.*/#define DISCORDAPI_VERSION \"$VERSION\"/" \
            amxmodx/scripting/include/discordapiconsts.inc

      - name: Download libs
        uses: actions/download-artifact@v4
        with:
          name: vendor-bin
          path: vendor/bin

      - name: Download compiled plugins
        uses: actions/download-artifact@v4
        with:
          name: amxx-plugins
          path: amxx-plugins/

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: shared-builder

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker-images/debian12-i386
          file: ./docker-images/debian12-i386/Dockerfile
          tags: amxx-builder:debian12-i386
          load: true
          cache-from: type=gha,scope=docker-debian12-i386
          cache-to: type=gha,mode=max,scope=docker-debian12-i386
          provenance: false

      - name: Build project
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxx-builder:debian12-i386 \
            bash -c "
              rm -rf build &&
              mkdir build &&
              cd build &&
              cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
                -DLIB_DIR=/workspace/vendor/bin &&
              make -j$(nproc || echo 2)
            "

      - name: Package & ZIP
        id: package
        run: |
          set -euo pipefail

          mkdir -p package/bin/linux
          cp -r build/*.so package/bin/linux/ || true

          mkdir -p package/addons/amxmodx/scripting
          cp -r amxmodx/scripting/* package/addons/amxmodx/scripting/ || true

          mkdir -p package/addons/amxmodx/configs
          cp -r amxmodx/configs/* package/addons/amxmodx/configs/ || true

          mkdir -p package/addons/amxmodx/plugins
          cp amxx-plugins/*.amxx package/addons/amxmodx/plugins/ || true

          ZIP="amxmodx-discord-api-v${VERSION}-${{ matrix.config.name }}.zip"
          (cd package && zip -r "../$ZIP" .)
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amxmodx-discord-api-v${{ needs.versioning.outputs.version }}-${{ matrix.config.name }}
          path: ${{ github.workspace }}/${{ steps.package.outputs.zip }}

# ---------------------------------------------------
# 6. PUBLISH GITHUB RELEASE
# ---------------------------------------------------
  publish-release:
    runs-on: ubuntu-latest
    needs: [build-project, versioning]
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq gh

      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          LAST_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"

          if [ -n "$LAST_TAG" ]; then
            LAST_TAG_DATE="$(git show -s --format=%cI "$LAST_TAG")"
            PRS_JSON="$(gh pr list --state merged --limit 200 --json number,title,author,url,mergedAt \
              | jq --arg dt "$LAST_TAG_DATE" '[.[] | select(.mergedAt > $dt)]')"
          else
            PRS_JSON="$(gh pr list --state merged --limit 200 --json number,title,author,url,mergedAt)"
          fi

          section() {
            local heading="$1"
            local jq_expr="$2"
            local rendered
            rendered="$(echo "$PRS_JSON" | jq -r "$jq_expr")"

            if [ -n "$rendered" ]; then
              {
                echo "## $heading"
                echo "$rendered"
                echo ""
              } >> "$GITHUB_OUTPUT"
            fi
          }

          {
            echo "CHANGELOG<<EOF"
            echo "# 🚀 Pre-Release v${{ needs.versioning.outputs.version }}"
            echo ""
          } >> "$GITHUB_OUTPUT"

          section "✨ Features" '
            .[]
            | select(.title | test("^feat(\\(.*\\))?:"))
            | "- [" + (.title | sub("^feat(\\(.*\\))?: "; "")) + "](" + .url + ") (#" + (.number|tostring) + ") · [@" + (.author.login // "unknown") + "](https://github.com/" + (.author.login // "unknown") + ")"
          '

          section "🐛 Bug Fixes" '
            .[]
            | select(.title | test("^fix(\\(.*\\))?:"))
            | "- [" + (.title | sub("^fix(\\(.*\\))?: "; "")) + "](" + .url + ") (#" + (.number|tostring) + ") · [@" + (.author.login // "unknown") + "](https://github.com/" + (.author.login // "unknown") + ")"
          '

          section "⚡ Performance" '
            .[]
            | select(.title | test("^perf(\\(.*\\))?:"))
            | "- [" + (.title | sub("^perf(\\(.*\\))?: "; "")) + "](" + .url + ") (#" + (.number|tostring) + ") · [@" + (.author.login // "unknown") + "](https://github.com/" + (.author.login // "unknown") + ")"
          '

          section "💥 Breaking Changes" '
            .[]
            | select(.title | test("^feat(!|\\(.*\\)!):"))
            | "- [" + (.title | sub("^feat(!|\\(.*\\)!):[ ]*"; "")) + "](" + .url + ") (#" + (.number|tostring) + ") · [@" + (.author.login // "unknown") + "](https://github.com/" + (.author.login // "unknown") + ")"
          '

          section "🔧 Other Changes" '
            .[]
            | select(
                (.title | test("^feat(\\(.*\\))?:") | not) and
                (.title | test("^fix(\\(.*\\))?:") | not) and
                (.title | test("^perf(\\(.*\\))?:") | not) and
                (.title | test("^feat(!|\\(.*\\)!):") | not)
              )
            | "- [" + .title + "](" + .url + ") (#" + (.number|tostring) + ") · [@" + (.author.login // "unknown") + "](https://github.com/" + (.author.login // "unknown") + ")"
          '

          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: amxmodx-discord-api-*
          merge-multiple: false

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.versioning.outputs.version }}
          name: Pre-Release v${{ needs.versioning.outputs.version }}
          prerelease: true
          generate_release_notes: false
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: artifacts/**/*.zip