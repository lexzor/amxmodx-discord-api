name: Dev CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:

  docker-cache:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - name: debian12-i386
            context: ./docker-images/debian12-i386
            dockerfile: ./docker-images/debian12-i386/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Compute Docker hash
        id: hash
        run: |
          HASH=$(find "${{ matrix.image.context }}" -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Restore docker cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .docker-cache-marker
          key: docker-${{ matrix.image.name }}-${{ steps.hash.outputs.hash }}

      - name: Build Docker image
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: amxmodx-discord-api/${{ matrix.image.name }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save docker cache marker
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .docker-cache-marker
          echo "built" > .docker-cache-marker/done

      - uses: actions/cache/save@v4
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          path: .docker-cache-marker
          key: docker-${{ matrix.image.name }}-${{ steps.hash.outputs.hash }}

  libs-build:
    runs-on: ubuntu-latest
    needs: docker-cache

    strategy:
      matrix:
        image:
          - name: debian12-i386

    steps:
      - uses: actions/checkout@v4

      - name: Compute libs hash
        id: hash
        run: |
          HASH=$(find libs_builder.sh docker-images -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Restore libs cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/
          key: libs-${{ matrix.image.name }}-${{ steps.hash.outputs.hash }}

      - name: Run libs builder
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxmodx-discord-api/${{ matrix.image.name }}:dev \
            bash ./libs_builder.sh

      - name: Save libs cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/
          key: libs-${{ matrix.image.name }}-${{ steps.hash.outputs.hash }}