name: Dev CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  build-dev:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - name: debian12-i386
            context: ./docker-images/debian12-i386
            dockerfile: ./docker-images/debian12-i386/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute Docker hash
        id: docker_hash
        run: |
          HASH=$(find "${{ matrix.image.context }}" -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: amxmodx-discord-api/${{ matrix.image.name }}:dev
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute libs hash
        id: libs_hash
        run: |
          HASH=$(find libs_builder.sh docker-images -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Restore libs cache
        id: libs_cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/
          key: libs-${{ matrix.image.name }}-${{ steps.libs_hash.outputs.hash }}

      - name: Run libs_builder.sh
        if: steps.libs_cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxmodx-discord-api/${{ matrix.image.name }}:dev \
            bash ./libs_builder.sh

      - name: Save libs cache
        if: steps.libs_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/
          key: libs-${{ matrix.image.name }}-${{ steps.libs_hash.outputs.hash }}