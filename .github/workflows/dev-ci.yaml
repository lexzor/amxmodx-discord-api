name: Dev CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - dev


jobs:

# ---------------------------------------------------
# 1. DOCKER + LIBS BUILD (warms global cache)
# ---------------------------------------------------
  build-dev:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - name: debian12-i386
            context: ./docker-images/debian12-i386
            dockerfile: ./docker-images/debian12-i386/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: shared-builder

      - name: Build Docker image (warm cache only)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: amxmodx-discord-api/${{ matrix.image.name }}:dev
          push: false
          load: true

          cache-from: type=gha,scope=dev-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=dev-${{ matrix.image.name }}

      - name: Run libs builder (cached container)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxmodx-discord-api/${{ matrix.image.name }}:dev \
            bash ./libs_builder.sh


# ---------------------------------------------------
# 2. BUILD PROJECT + PACKAGE
# ---------------------------------------------------
  build-project:
    runs-on: ubuntu-latest
    needs: build-dev

    strategy:
      matrix:
        config:
          - name: release
            build_type: Release
          - name: debug
            build_type: Debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: shared-builder

      # IMPORTANT FIX:
      # Image must exist in THIS job too
      - name: Build Docker image (required for runtime)
        uses: docker/build-push-action@v6
        with:
          context: ./docker-images/debian12-i386
          file: ./docker-images/debian12-i386/Dockerfile
          tags: amxmodx-discord-api/debian12-i386:dev
          push: false
          load: true

          cache-from: type=gha,scope=dev-debian12-i386
          cache-to: type=gha,mode=max,scope=dev-debian12-i386

      - name: Build project (CMake)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            amxmodx-discord-api/debian12-i386:dev \
            bash -c "
              rm -rf build &&
              mkdir build &&
              cd build &&
              cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} &&
              make -j$(nproc || echo 2)
            "

      - name: Prepare package structure
        run: |
          mkdir -p package

          mkdir -p package/bin/linux
          cp -r build/*.so package/bin/linux/ || true

          mkdir -p package/addons/amxmodx/plugins
          cp -r addons/amxmodx/plugins/*.amxx package/addons/amxmodx/plugins/ || true

          mkdir -p package/addons/amxmodx/scripting
          cp -r addons/amxmodx/scripting/* package/addons/amxmodx/scripting/ || true

          mkdir -p package/addons/amxmodx/configs
          cp -r addons/amxmodx/configs/* package/addons/amxmodx/configs/ || true

      - name: Create ZIP
        run: |
          VERSION="v0.0.0-${GITHUB_SHA::7}"
          ZIP_NAME="amxmodx-discord-api-${VERSION}-${{ matrix.config.name }}.zip"

          cd package
          zip -r ../$ZIP_NAME .

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}